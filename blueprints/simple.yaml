spec_version: 2

description: description text blah blahhh

inputs:
  input1:
    type: string
    display-style: normal
    default: "default1"
    description: "environemnt input 1"
  input2:
    type: string
    display-style: normal
    description: "environemnt input 2"
  radio_input:
    type: string
    style: radio
    allowed-values: [a, b, c]


outputs:
  output1:
    value: '{{sandboxId}}'
  output2:
    value: '{{.inputs.input1}}'
  output3:
    value: '{{.grains.helloTF.outputs.output1}}'
    

grains:
  helloTF:
    kind: terraform
    spec:
      source:
        path: github.com/QualiNext/test-spec2-public.git//terraform/simple-tf-module
      agent:
        name: eks
      inputs:
        - test_input1: env-input-{{.inputs.input1}}
        - test_input2: env-id-{{sandboxId}}
      outputs:
        - output1
        - output2