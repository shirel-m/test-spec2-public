spec_version: 2

inputs:
  s3_bucket_name:
    type: string
    description: Name of S3 bucket
  db_name:
    type: string
    description: db name
  sandbox_id:
    type: string
    description: unique id
  username:
    type: string
    description: User name
  acl:
    type: string
    default: public
    description: Canned ACL to apply to the bucket. Default is private.
  agent:
    default: "eks"

grains:
  s3:
    kind: blueprint
    depends-on: rds
    spec:
      source:
        store: test-spec2-public
        path: blueprints
      agent:
        name: '{{inputs.agent}}'
      inputs:
        - name: '{{inputs.s3_bucket_name}}'
        - agent: '{{inputs.agent}}'
        - acl: '{{inputs.acl}}'
      outputs:
        - s3_bucket_arn
  
  simple:
    kind: blueprint
    depends-on: rds
    spec:
      source:
        store: test-spec2-public
        path: blueprints
      agent:
        name: '{{inputs.agent}}'
      outputs:
        - output1
        - output2
  
  rds:
    kind: blueprint
    spec:
      source:
        store: test-spec2-public
        path: blueprints
      agent:
        name: '{{inputs.agent}}'
      inputs:
        - db_name: '{{inputs.db_name}}'
        - sandbox_id: '{{inputs.sandbox_id}}'
        - username: '{{inputs.username}}'
        - agent: '{{inputs.agent}}'
      outputs:
        - connection_string
        - hostname
  